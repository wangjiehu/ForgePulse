name: verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/backend/pyproject.toml

      - name: Install backend
        working-directory: app/backend
        run: python -m pip install -e ".[dev]"

      - name: Run backend tests
        working-directory: app/backend
        run: python -m pytest -q

      - name: Run golden and robustness evaluation
        run: python evaluation/evaluate_cases.py

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend
        working-directory: app/frontend
        run: npm ci

      - name: Build frontend
        working-directory: app/frontend
        run: npm run build

      - name: Audit frontend dependencies
        working-directory: app/frontend
        run: npm audit --audit-level=high

      - name: Run frontend smoke
        working-directory: app/frontend
        run: npm run smoke
